<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Netlify Forms Detection</title></head>
<body>
  <!--
    This file exists so Netlify can detect the contact form at build time.
    Next.js renders forms client-side, which Netlify's crawler can't see.
    The hidden field names here must exactly match those used in ContactForm.tsx.
  -->
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="order_intent" />
    <input name="full_name" />
    <input name="company_name" />
    <input name="email_address" />
    <input name="phone_number" />
    <input name="search_type" />
    <input name="state" />
    <input name="property_address" />
    <textarea name="additional_notes"></textarea>
  </form>
</body>
</html>
