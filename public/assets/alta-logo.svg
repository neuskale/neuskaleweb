<svg width="380" height="90" viewBox="0 0 380 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield with horizontal stripes -->
  <g transform="translate(0,2)">
    <!-- Shield shape definition -->
    <defs>
      <clipPath id="shield">
        <path d="M2 6C2 3 4 0 8 0H58C62 0 64 3 64 6V48C64 62 33 82 33 82C33 82 2 62 2 48Z"/>
      </clipPath>
    </defs>
    <!-- Shield fill with stripes -->
    <g clip-path="url(#shield)">
      <!-- Blue base -->
      <rect width="66" height="84" fill="#2B5797"/>
      <!-- Lighter blue horizontal stripes -->
      <rect y="0" width="66" height="7" fill="#3366AA" opacity="0.5"/>
      <rect y="13" width="66" height="5" fill="#1E4477"/>
      <rect y="24" width="66" height="5" fill="#1E4477"/>
      <rect y="35" width="66" height="5" fill="#1E4477"/>
      <rect y="46" width="66" height="5" fill="#1E4477"/>
      <rect y="57" width="66" height="5" fill="#1E4477"/>
      <rect y="68" width="66" height="5" fill="#1E4477"/>
    </g>
    <!-- Shield outline -->
    <path d="M2 6C2 3 4 0 8 0H58C62 0 64 3 64 6V48C64 62 33 82 33 82C33 82 2 62 2 48Z" fill="none" stroke="#2B5797" stroke-width="1.5"/>

    <!-- Red eagle head (profile facing right) -->
    <g transform="translate(10,6)">
      <!-- Head and neck silhouette -->
      <path d="M18 2C12 2 6 8 5 14C4 18 5 22 8 26L12 30C14 32 14 36 12 38L8 42C10 44 14 44 18 42L22 38C26 34 28 28 28 22L28 16C28 8 24 2 18 2Z" fill="#C22326"/>
      <!-- Beak -->
      <path d="M26 14L38 12L28 18Z" fill="#C22326"/>
      <path d="M30 14L38 12L32 16Z" fill="#A01E20"/>
      <!-- Eye -->
      <circle cx="20" cy="14" r="2.5" fill="white"/>
      <circle cx="21" cy="14" r="1.2" fill="#222"/>
    </g>
  </g>

  <!-- "ALTA" text - bold blue -->
  <text x="76" y="52" font-family="'Arial Black','Trebuchet MS',Arial,sans-serif" font-size="58" fill="#2B5797" font-weight="900" letter-spacing="1">ALTA</text>

  <!-- Subtitle -->
  <text x="78" y="76" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15.5" fill="#555555" font-weight="400" letter-spacing="0.3">American Land Title Association</text>
</svg>